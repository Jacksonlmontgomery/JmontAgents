<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JmontAgents - AI Agent Impact Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Top Nav -->
    <nav class="top-nav">
        <div class="nav-inner">
            <div class="nav-left">
                <span class="nav-logo">Jmont</span><span class="nav-logo-accent">Agents</span>
                <span class="nav-badge">AI Impact Dashboard</span>
            </div>
            <div class="nav-right">
                <button class="btn btn-ghost" id="exportBtn" title="Export JSON">Export</button>
                <button class="btn btn-accent" id="addAgentBtn">+ New Agent</button>
            </div>
        </div>
    </nav>

    <main class="container">

        <!-- Exec KPI Strip -->
        <section class="kpi-strip" id="kpiStrip"></section>

        <!-- Filters -->
        <section class="filter-bar">
            <div class="filter-item">
                <select id="filterDepartment">
                    <option value="all">All Departments</option>
                </select>
            </div>
            <div class="filter-item">
                <select id="filterStatus">
                    <option value="all">All Statuses</option>
                    <option value="planning">Planning</option>
                    <option value="active">Active</option>
                    <option value="testing">Testing</option>
                    <option value="deployed">Deployed</option>
                    <option value="paused">Paused</option>
                </select>
            </div>
            <div class="filter-item filter-search">
                <input type="text" id="searchInput" placeholder="Search agents, owners, departments...">
            </div>
        </section>

        <!-- Department Accordion List -->
        <section class="dept-list" id="deptList"></section>

    </main>

    <!-- Add/Edit Agent Modal -->
    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="modal-head">
                <h2 id="modalTitle">New Agent</h2>
                <button class="modal-x" id="modalClose">&times;</button>
            </div>

            <!-- Modal Tabs -->
            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="details">Details</button>
                <button class="modal-tab" data-tab="usage">Usage & Impact</button>
            </div>

            <form id="agentForm" class="modal-body" autocomplete="off">
                <input type="hidden" id="agentId">

                <!-- Tab: Details -->
                <div class="tab-panel active" data-panel="details">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agentName">Agent Name *</label>
                            <input type="text" id="agentName" required placeholder="e.g. Customer Support Bot">
                        </div>
                        <div class="form-group">
                            <label for="agentDepartment">Department *</label>
                            <select id="agentDepartment" required>
                                <option value="">Select...</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Sales">Sales</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Customer Support">Customer Support</option>
                                <option value="HR">HR</option>
                                <option value="Finance">Finance</option>
                                <option value="Operations">Operations</option>
                                <option value="Legal">Legal</option>
                                <option value="Product">Product</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agentStatus">Status *</label>
                            <select id="agentStatus" required>
                                <option value="planning">Planning</option>
                                <option value="active">Active</option>
                                <option value="testing">Testing</option>
                                <option value="deployed">Deployed</option>
                                <option value="paused">Paused</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="agentOwner">Owner</label>
                            <input type="text" id="agentOwner" placeholder="e.g. Jane Smith">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agentStartDate">Start Date</label>
                            <input type="date" id="agentStartDate">
                        </div>
                        <div class="form-group">
                            <label for="agentTargetDate">Target Date</label>
                            <input type="date" id="agentTargetDate">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="agentDescription">Description</label>
                        <textarea id="agentDescription" rows="2" placeholder="What does this agent do?"></textarea>
                    </div>
                </div>

                <!-- Tab: Usage & Impact -->
                <div class="tab-panel" data-panel="usage">
                    <p class="tab-hint">Track real usage and tie it to dollars. If it's not used, it's not real.</p>

                    <div class="form-section-label">Usage Tracking</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agentUsesPerWeek">Uses / Week</label>
                            <input type="number" id="agentUsesPerWeek" min="0" value="0" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label for="agentActiveUsers">Active Users</label>
                            <input type="text" id="agentActiveUsers" placeholder="e.g. Kylie, Jackson, Sales">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agentLastUsed">Last Used Date</label>
                            <input type="date" id="agentLastUsed">
                        </div>
                        <div class="form-group">
                            <label for="agentHoursSaved">Est. Hours Saved / Week</label>
                            <input type="number" id="agentHoursSaved" min="0" step="0.5" value="0" placeholder="0">
                        </div>
                    </div>

                    <div class="form-section-label">Financial Impact</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agentBlendedRate">Blended Hourly Rate ($)</label>
                            <input type="number" id="agentBlendedRate" min="0" value="100" placeholder="100">
                        </div>
                        <div class="form-group">
                            <label>$ Value Saved / Year</label>
                            <div class="computed-value" id="computedSavings">$0</div>
                        </div>
                    </div>

                    <div class="form-section-label">Revenue Influence</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="agentRevenueInfluence">Revenue Tie</label>
                            <select id="agentRevenueInfluence">
                                <option value="none">None</option>
                                <option value="indirect">Indirect (faster output, better quality)</option>
                                <option value="direct">Direct (closed deals, pipeline)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="agentRevenueNote">Revenue Note</label>
                            <input type="text" id="agentRevenueNote" placeholder="e.g. Used in 12 proposals">
                        </div>
                    </div>

                    <div class="form-section-label">Replacement Value</div>
                    <div class="form-group">
                        <label for="agentReplaces">What does this replace?</label>
                        <input type="text" id="agentReplaces" placeholder="e.g. Replaces manual proposal writing, avoids hiring 1 junior">
                    </div>
                </div>

                <div class="modal-foot">
                    <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-accent" id="saveBtn">Save Agent</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-bg" id="deleteBg">
        <div class="modal modal-sm">
            <div class="modal-head">
                <h2>Delete Agent</h2>
                <button class="modal-x" id="deleteClose">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete <strong id="deleteAgentName"></strong>? This cannot be undone.</p>
                <div class="modal-foot">
                    <button class="btn btn-ghost" id="deleteCancelBtn">Cancel</button>
                    <button class="btn btn-danger" id="deleteConfirmBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
